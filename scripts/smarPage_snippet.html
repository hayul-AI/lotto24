	<script>
		/* 타이틀 정보*/
		document.addEventListener("DOMContentLoaded", function() {
		  checkInAPI();
			
		  const breadCrumb = document.querySelector(".bread-crumb .nav-ul");
		  if (!breadCrumb) return;

		  const links = breadCrumb.querySelectorAll(".nav-li > .nav-a");
		  const linkTexts = Array.from(links).slice(1).map(a => a.textContent.trim());

		  const siteName = "동행복권";
	
		  const updateTitle = () => {
			  const links = breadCrumb.querySelectorAll(".nav-li > .nav-a");
			  const linkTexts = Array.from(links)
			                         .slice(1)
			                         .map(a => a.textContent.trim())
			                         .filter(t => t !== ""); // 빈 값 제외
			        
			  if (linkTexts.length > 0) {
				document.title = linkTexts.join(" > ") + " | " + siteName;
			  }
		  };
	
		  // #midNav 있으면, 내용 바뀔 때 타이틀 생성하도록 분기
		  const targetNode = document.getElementById('midNav');
		  if (targetNode) {
		      const observer = new MutationObserver(() => {
		          updateTitle();
		      });
		      observer.observe(targetNode, { childList: true, characterData: true, subtree: true });
		  } else {
			  updateTitle();
		  }
		});
	</script>

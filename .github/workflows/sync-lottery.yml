name: Sync Lottery Results

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync Mode"
        required: true
        default: "all"
        type: choice
        options:
          - lotto
          - pension
          - all

  schedule:
    - cron: "20 12 * * 6"
    - cron: "0 11 * * 4"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Run Sync Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT secret is missing."
            exit 1
          fi

          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "20 12 * * 6" ]; then
              echo "Running Lotto 6/45 auto sync..."
              npm run sync:lotto
            elif [ "${{ github.event.schedule }}" = "0 11 * * 4" ]; then
              echo "Running Pension Lottery 720+ auto sync..."
              npm run sync:pension
            else
              echo "Unknown schedule. Running all sync..."
              npm run sync:latest
            fi
          else
            echo "Running manual sync mode: ${{ github.event.inputs.mode }}"

            if [ "${{ github.event.inputs.mode }}" = "lotto" ]; then
              npm run sync:lotto
            elif [ "${{ github.event.inputs.mode }}" = "pension" ]; then
              npm run sync:pension
            else
              npm run sync:latest
            fi
          fi

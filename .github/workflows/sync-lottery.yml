name: Sync Lottery Results

on:
  schedule:
    # 로또 6/45: 매주 토요일 21:20 KST (12:20 UTC)
    - cron: "20 12 * * 6"
    # 연금복권 720+: 매주 목요일 20:00 KST (11:00 UTC)
    - cron: "0 11 * * 4"
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync Mode (lotto, pension, all)'
        required: true
        default: 'all'
        type: choice
        options:
          - lotto
          - pension
          - all

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/checkout@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Sync Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            # 스케줄 실행 시 요일에 따라 모드 결정
            DAY_OF_WEEK=$(date +%u)
            if [ "$DAY_OF_WEEK" == "6" ]; then
              npm run sync:lotto
            elif [ "$DAY_OF_WEEK" == "4" ]; then
              npm run sync:pension
            else
              npm run sync:latest
            fi
          else
            # 수동 실행 시 입력값 사용
            node scripts/syncLatestResults.js ${{ github.event.inputs.mode }}
          fi

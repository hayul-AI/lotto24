name: Sync Lottery Results

on:
  schedule:
    # Lotto 6/45: Every Saturday 21:20 KST / 12:20 UTC
    - cron: "20 12 * * 6"

    # Pension Lottery 720+: Every Thursday 20:00 KST / 11:00 UTC
    - cron: "0 11 * * 4"

  workflow_dispatch:
    inputs:
      mode:
        description: "Sync Mode"
        required: true
        default: "all"
        type: choice
        options:
          - lotto
          - pension
          - all

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Run Sync Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT secret is missing."
            exit 1
          fi

          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "${{ github.event.schedule }}" = "20 12 * * 6" ]; then
              echo "Running Lotto 6/45 auto sync..."
              npm run sync:lotto
            elif [ "${{ github.event.schedule }}" = "0 11 * * 4" ]; then
              echo "Running Pension Lottery 720+ auto sync..."
              npm run sync:pension
            else
              echo "Unknown schedule. Running all sync..."
              npm run sync:latest
            fi
          else
            case "${{ github.event.inputs.mode }}" in
              "lotto")
                npm run sync:lotto
                ;;
              "pension")
                npm run sync:pension
                ;;
              *)
                npm run sync:latest
                ;;
            esac
          fi

name: Sync Lottery Results

# GitHub Actions cron은 UTC 기준이며, KST 토요일 21:00은 UTC 토요일 12:00이다.
on:
  schedule:
    - cron: "0 12 * * 6"    # 토요일 21:00 KST
    - cron: "20 12 * * 6"   # 토요일 21:20 KST
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync Mode"
        required: true
        default: "all"
        type: choice
        options:
          - lotto
          - pension
          - all

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Sync Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT secret is missing."
            exit 1
          fi

          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Running scheduled sync (all)..."
            npm run sync:latest
          else
            MODE="${{ github.event.inputs.mode }}"
            echo "Running manual sync mode: $MODE"
            if [ "$MODE" = "lotto" ]; then
              npm run sync:lotto
            elif [ "$MODE" = "pension" ]; then
              npm run sync:pension
            else
              npm run sync:latest
            fi
          fi
